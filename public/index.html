<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Controle de Atendimentos · Mari</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#080e1a;color:#e2e8f0;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding-bottom:60px;}
  input,button{font-family:'DM Sans',sans-serif;}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}

  .header{background:linear-gradient(135deg,#0f1c2e 0%,#0a1628 100%);border-bottom:1px solid #1e3a5f;padding:20px 20px 0;}
  .header-inner{max-width:900px;margin:0 auto;}
  .header-top{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
  .header-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:#7dd3fc;}
  .header-sub{font-size:12px;color:#64748b;margin-top:2px;}
  .tabs{display:flex;gap:4px;margin-top:16px;}
  .tab{background:transparent;color:#64748b;border:none;border-bottom:2px solid transparent;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;border-radius:4px 4px 0 0;transition:all .2s;}
  .tab:hover{background:#1e2d40;}
  .tab.active{background:#1e3a5f;color:#7dd3fc;border-bottom:2px solid #38bdf8;}

  .main{max-width:900px;margin:0 auto;padding:20px 16px;}

  .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .month-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;}
  .month-label{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#e2e8f0;}

  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{border-radius:20px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;border:1px solid #334155;background:#1e293b;color:#94a3b8;}
  .chip:hover{filter:brightness(1.2);}
  .chip.all-active{background:#1e3a5f;border-color:#38bdf8;color:#7dd3fc;}

  .day-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
  .day-header{text-align:center;font-size:11px;color:#475569;padding:4px 0;font-weight:700;}
  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .day-cell{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:6px 5px;min-height:75px;transition:background .15s;position:relative;}
  .day-cell.today{background:#0f2744;border-color:#1d4ed8;}
  .day-num{font-size:11px;font-weight:500;color:#64748b;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
  .day-num.today-num{color:#60a5fa;font-weight:700;}
  .today-badge{font-size:9px;background:#1d4ed8;color:#fff;border-radius:4px;padding:1px 4px;}
  .add-day-btn{position:absolute;bottom:4px;right:4px;background:#1e293b;border:1px solid #334155;color:#475569;width:18px;height:18px;border-radius:4px;cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .add-day-btn:hover{background:#1e3a5f;color:#7dd3fc;border-color:#38bdf8;}
  .status-btn{width:100%;border-radius:5px;padding:3px 5px;font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .15s;text-align:left;margin-bottom:2px;border-left-width:3px;border-left-style:solid;}
  .status-btn:hover{filter:brightness(1.3);transform:scale(1.03);}

  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;padding:12px 16px;background:#0f172a;border-radius:10px;border:1px solid #1e293b;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#64748b;}

  .summary-card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:20px;margin-bottom:16px;}
  .summary-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
  .summary-name{font-size:16px;font-weight:700;margin-bottom:4px;}
  .summary-period{font-size:12px;color:#475569;}
  .summary-count{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:#4ade80;}
  .summary-count-label{font-size:11px;color:#64748b;text-align:right;}
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
  .summary-stat{border-radius:8px;padding:10px 8px;text-align:center;}
  .summary-stat-icon{font-size:18px;margin-bottom:2px;}
  .summary-stat-num{font-size:20px;font-weight:700;}
  .summary-stat-label{font-size:9px;color:#475569;margin-top:2px;}
  .days-realizados{background:#052e16;border:1px solid #166534;border-radius:8px;padding:12px;}
  .days-realizados-title{font-size:11px;color:#4ade80;font-weight:700;margin-bottom:8px;}
  .day-badge{background:#166534;color:#4ade80;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;display:inline-block;margin:2px;}
  .empty-msg{font-size:12px;color:#334155;text-align:center;padding:20px 0;}

  .add-patient-box{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:20px;margin-bottom:16px;}
  .add-patient-title{font-size:14px;color:#7dd3fc;font-weight:700;margin-bottom:14px;}
  .text-input{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;outline:none;width:100%;}
  .text-input:focus{border-color:#38bdf8;}
  .btn-primary{background:#1d4ed8;border:none;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;white-space:nowrap;}
  .btn-primary:hover{background:#2563eb;}

  .weekdays-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .wd-btn{background:#1e293b;border:1px solid #334155;color:#64748b;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
  .wd-btn.selected{background:#1e3a5f;border-color:#38bdf8;color:#7dd3fc;}

  .patient-row{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
  .patient-row-top{display:flex;align-items:center;justify-content:space-between;}
  .patient-name{font-size:15px;font-weight:600;}
  .patient-days{font-size:11px;color:#475569;margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;}
  .patient-day-tag{background:#1e293b;border:1px solid #334155;color:#64748b;padding:3px 8px;border-radius:10px;font-size:11px;}
  .patient-actions{display:flex;gap:8px;flex-shrink:0;margin-left:12px;}
  .btn-edit{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
  .btn-del{background:#2d0a0a;border:1px solid #7f1d1d;color:#f87171;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;}

  /* Modals */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .modal{background:#0f1c2e;border:1px solid #1e3a5f;border-radius:16px;padding:24px;width:100%;max-width:360px;max-height:90vh;overflow-y:auto;}
  .modal-title{font-family:'Fraunces',serif;color:#7dd3fc;font-size:18px;margin-bottom:4px;}
  .modal-sub{color:#475569;font-size:13px;margin-bottom:20px;}
  .status-opt{width:100%;background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:12px 16px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;font-size:14px;font-weight:500;margin-bottom:8px;}
  .status-opt:hover{filter:brightness(1.2);transform:translateX(4px);}
  .status-opt.current{font-weight:700;}
  .status-opt-icon{font-size:18px;width:24px;text-align:center;}
  .current-badge{margin-left:auto;font-size:12px;}
  .btn-clear{width:100%;background:transparent;border:1px dashed #334155;color:#475569;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;margin-top:4px;}
  .btn-remove-day{width:100%;background:#2d0a0a;border:1px solid #7f1d1d;color:#f87171;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;margin-top:6px;}
  .btn-close{width:100%;background:transparent;border:none;color:#475569;cursor:pointer;font-size:13px;padding:8px;margin-top:16px;}

  /* Add to day modal */
  .patient-pick-btn{width:100%;background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:12px 16px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;margin-bottom:8px;transition:all .15s;}
  .patient-pick-btn:hover{filter:brightness(1.2);}
  .patient-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}

  .saving{position:fixed;bottom:20px;right:20px;background:#1e3a5f;border:1px solid #38bdf8;color:#7dd3fc;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;transition:opacity .3s;}

  @media(max-width:480px){
    .summary-grid{grid-template-columns:repeat(2,1fr);}
    .day-cell{min-height:60px;padding:4px 3px;}
    .status-btn{font-size:9px;padding:2px 3px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <span style="font-size:28px">🩺</span>
      <div>
        <div class="header-title">Controle de Atendimentos</div>
        <div class="header-sub">Mari · Fisioterapia Pediátrica</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('agenda')">📅 Agenda</button>
      <button class="tab" onclick="switchTab('summary')">📊 Resumo</button>
      <button class="tab" onclick="switchTab('patients')">👥 Pacientes</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="view-agenda"></div>
  <div id="view-summary" style="display:none"></div>
  <div id="view-patients" style="display:none"></div>
</div>

<div class="saving" id="saving-indicator" style="opacity:0">💾 Salvando...</div>

<!-- Status modal -->
<div class="modal-overlay" id="modal-status" style="display:none" onclick="closeModals()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-patient-name"></div>
    <div class="modal-sub" id="modal-date-label"></div>
    <div id="modal-status-options"></div>
    <button class="btn-close" onclick="closeModals()">Fechar</button>
  </div>
</div>

<!-- Add patient to day modal -->
<div class="modal-overlay" id="modal-add-day" style="display:none" onclick="closeModals()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Adicionar paciente</div>
    <div class="modal-sub" id="modal-add-date-label"></div>
    <div id="modal-add-options"></div>
    <button class="btn-close" onclick="closeModals()">Fechar</button>
  </div>
</div>

<script>
const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DAYS_SHORT = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const DAYS_FULL = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

const STATUS = {
  realizado:           { label:"Realizado",      color:"#4ade80", bg:"#052e16", icon:"✓" },
  faltou:              { label:"Faltou",          color:"#f87171", bg:"#2d0a0a", icon:"✗" },
  desmarcado_paciente: { label:"Desmarcou",       color:"#fb923c", bg:"#2d1200", icon:"↩" },
  desmarcado_eu:       { label:"Eu cancelei",     color:"#a78bfa", bg:"#1a0a2e", icon:"↪" },
  agendado:            { label:"Agendado",        color:"#94a3b8", bg:"#0f1a2e", icon:"○" },
};
const COLORS = ["#60a5fa","#f472b6","#34d399","#fbbf24","#a78bfa","#fb923c","#2dd4bf","#f87171","#e879f9","#86efac"];

// state.patients: [{id, name, color, fixedDays:[0,1,2...]}]
// state.records: {"date_pid": status}
// state.extras: {"date": [pid, pid]} — pacientes avulsos adicionados naquele dia
// state.removed: {"date": [pid]} — pacientes fixos removidos de um dia específico
let state = { patients: [], records: {}, extras: {}, removed: {} };
let currentTab = "agenda";
let selectedMonth = new Date().getMonth();
let selectedYear = new Date().getFullYear();
let selectedPatient = null;
let modalStatusCtx = null;
let modalAddCtx = null;
let saveTimer = null;
let editingPatient = null;
let newFixedDays = [];

const todayStr = (() => {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
})();

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch("/api/data");
    const d = await r.json();
    state.patients = d.patients || [];
    state.records  = d.records  || {};
    state.extras   = d.extras   || {};
    state.removed  = d.removed  || {};
  } catch(e) { console.error(e); }
  renderAll();
}

function scheduleSave() {
  clearTimeout(saveTimer);
  const ind = document.getElementById("saving-indicator");
  ind.style.opacity = "1";
  saveTimer = setTimeout(async () => {
    await fetch("/api/data", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(state) });
    ind.style.opacity = "0";
  }, 800);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const getKey    = (date, pid) => `${date}_${pid}`;
const fmtDate   = (y, m, d)  => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const daysInMonth = (m, y)   => new Date(y, m+1, 0).getDate();
const firstDay    = (m, y)   => new Date(y, m, 1).getDay();
const dayOfWeek   = (date)   => new Date(date + "T12:00:00").getDay();

// Retorna lista de pids que aparecem num dado dia
function getPatientsForDay(date) {
  const dow = dayOfWeek(date);
  const result = [];
  const removedToday = state.removed[date] || [];
  for (const p of state.patients) {
    const isFixed  = (p.fixedDays || []).includes(dow);
    const isExtra  = (state.extras[date] || []).includes(p.id);
    const isRemoved = removedToday.includes(p.id);
    if ((isFixed || isExtra) && !isRemoved) result.push(p);
  }
  // filtro de paciente selecionado
  if (selectedPatient) return result.filter(p => p.id === selectedPatient);
  return result;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ["agenda","summary","patients"].forEach((t,i) => {
    document.getElementById(`view-${t}`).style.display = t === tab ? "" : "none";
    document.querySelectorAll(".tab")[i].className = "tab" + (t === tab ? " active" : "");
  });
  renderAll();
}

function renderAll() {
  if (currentTab === "agenda")   renderAgenda();
  if (currentTab === "summary")  renderSummary();
  if (currentTab === "patients") renderPatients();
}

function changeMonth(dir) {
  selectedMonth += dir;
  if (selectedMonth < 0)  { selectedMonth = 11; selectedYear--; }
  if (selectedMonth > 11) { selectedMonth = 0;  selectedYear++; }
  renderAll();
}

function monthNavHTML() {
  return `<div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label">${MONTHS[selectedMonth]} ${selectedYear}</span>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>`;
}

// ── Agenda ────────────────────────────────────────────────────────────────────
function renderAgenda() {
  const el = document.getElementById("view-agenda");
  const days = daysInMonth(selectedMonth, selectedYear);
  const fd   = firstDay(selectedMonth, selectedYear);

  const chipsHTML = `<div class="chips">
    <button class="chip ${!selectedPatient?'all-active':''}" onclick="selectPatient(null)">Todos</button>
    ${state.patients.map(p => `
      <button class="chip" onclick="selectPatient(${p.id})"
        style="background:${selectedPatient===p.id?p.color+'33':'#1e293b'};
               border-color:${selectedPatient===p.id?p.color:'#334155'};
               color:${selectedPatient===p.id?p.color:'#94a3b8'}">
        ${p.name.split(" ")[0]}
      </button>`).join("")}
  </div>`;

  const calHTML = `
    <div class="day-headers">${DAYS_SHORT.map(d=>`<div class="day-header">${d}</div>`).join("")}</div>
    <div class="calendar">
      ${"<div></div>".repeat(fd)}
      ${Array.from({length:days},(_,i) => {
        const day  = i + 1;
        const date = fmtDate(selectedYear, selectedMonth, day);
        const isToday = date === todayStr;
        const patientsToday = getPatientsForDay(date);

        const btns = patientsToday.map(p => {
          const st   = state.records[getKey(date, p.id)];
          const info = st ? STATUS[st] : null;
          return `<button class="status-btn" onclick="openStatusModal('${date}',${p.id})"
            style="background:${info?info.bg:'#1e293b'};
                   border-color:${info?info.color+'66':'#334155'};
                   border-left-color:${p.color};
                   color:${info?info.color:'#475569'}">
            <span>${info?info.icon:'○'}</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:48px">${p.name.split(" ")[0]}</span>
          </button>`;
        }).join("");

        return `<div class="day-cell${isToday?' today':''}">
          <div class="day-num${isToday?' today-num':''}">
            ${day}${isToday?'<span class="today-badge">hoje</span>':''}
          </div>
          ${btns}
          <button class="add-day-btn" onclick="openAddDayModal('${date}')" title="Adicionar paciente neste dia">+</button>
        </div>`;
      }).join("")}
    </div>`;

  const legendHTML = `<div class="legend">
    ${Object.entries(STATUS).map(([,v])=>`
      <div class="legend-item"><span style="color:${v.color};font-weight:700;font-size:14px">${v.icon}</span>${v.label}</div>
    `).join("")}
    <div class="legend-item"><span style="color:#475569;font-weight:700;font-size:14px">+</span>Adicionar avulso</div>
  </div>`;

  el.innerHTML = monthNavHTML() + chipsHTML + calHTML + legendHTML;
}

function selectPatient(id) {
  selectedPatient = id;
  renderAgenda();
}

// ── Status Modal ──────────────────────────────────────────────────────────────
function openStatusModal(date, pid) {
  modalStatusCtx = { date, pid };
  const patient = state.patients.find(p => p.id === pid);
  const current = state.records[getKey(date, pid)];
  const [y,m,d] = date.split("-");
  const dow = dayOfWeek(date);
  const isFixed = (patient?.fixedDays||[]).includes(dow);
  const isExtra = (state.extras[date]||[]).includes(pid);

  document.getElementById("modal-patient-name").textContent = patient?.name || "";
  document.getElementById("modal-date-label").textContent = `${d}/${m}/${y} · ${DAYS_FULL[dow]}`;

  document.getElementById("modal-status-options").innerHTML = `
    ${Object.entries(STATUS).map(([key,val])=>`
      <button class="status-opt${current===key?' current':''}" onclick="setStatus('${key}')"
        style="background:${current===key?val.bg:'#1e293b'};
               border-color:${current===key?val.color:'#334155'};
               color:${current===key?val.color:'#94a3b8'}">
        <span class="status-opt-icon">${val.icon}</span>
        <span>${val.label}</span>
        ${current===key?'<span class="current-badge">✓ atual</span>':''}
      </button>`).join("")}
    ${current?`<button class="btn-clear" onclick="setStatus(null)">Limpar registro</button>`:''}
    <button class="btn-remove-day" onclick="removeFromDay('${date}',${pid})">🗑️ Remover deste dia</button>
  `;
  document.getElementById("modal-status").style.display = "flex";
}

function setStatus(status) {
  if (!modalStatusCtx) return;
  const key = getKey(modalStatusCtx.date, modalStatusCtx.pid);
  if (status === null) delete state.records[key];
  else state.records[key] = status;
  scheduleSave();
  closeModals();
  renderAll();
}

function removeFromDay(date, pid) {
  // Remove registro de status se houver
  delete state.records[getKey(date, pid)];
  // Se era extra, remove dos extras
  if (state.extras[date]) {
    state.extras[date] = state.extras[date].filter(id => id !== pid);
    if (!state.extras[date].length) delete state.extras[date];
  }
  // Se era fixo, adiciona aos removidos daquele dia
  const patient = state.patients.find(p => p.id === pid);
  const dow = dayOfWeek(date);
  if ((patient?.fixedDays||[]).includes(dow)) {
    if (!state.removed[date]) state.removed[date] = [];
    if (!state.removed[date].includes(pid)) state.removed[date].push(pid);
  }
  scheduleSave();
  closeModals();
  renderAll();
}

// ── Add to day Modal ──────────────────────────────────────────────────────────
function openAddDayModal(date) {
  const [y,m,d] = date.split("-");
  const dow = dayOfWeek(date);
  document.getElementById("modal-add-date-label").textContent = `${d}/${m}/${y} · ${DAYS_FULL[dow]}`;

  // Pacientes que já aparecem nesse dia (não mostrar de novo)
  const alreadyToday = getPatientsForDay(date).map(p => p.id);
  // Pacientes removidos deste dia (podem ser re-adicionados)
  const removedToday = state.removed[date] || [];
  
  // Disponíveis = não aparecem hoje OU foram removidos (fixos removidos podem ser re-adicionados)
  const available = state.patients.filter(p => 
    !alreadyToday.includes(p.id)
  );

  if (!available.length) {
    document.getElementById("modal-add-options").innerHTML = 
      `<p style="color:#475569;font-size:13px;text-align:center;padding:20px 0">Todos os pacientes já estão neste dia!</p>`;
  } else {
    document.getElementById("modal-add-options").innerHTML = available.map(p => `
      <button class="patient-pick-btn" onclick="addPatientToDay('${date}',${p.id})">
        <span class="patient-dot" style="background:${p.color}"></span>
        <span>${p.name}</span>
        ${removedToday.includes(p.id) ? '<span style="margin-left:auto;font-size:11px;color:#fb923c">fixo removido</span>' : ''}
      </button>`).join("");
  }
  modalAddCtx = { date };
  document.getElementById("modal-add-day").style.display = "flex";
}

function addPatientToDay(date, pid) {
  // Se estava nos removidos, tira de lá
  if (state.removed[date]) {
    state.removed[date] = state.removed[date].filter(id => id !== pid);
    if (!state.removed[date].length) delete state.removed[date];
  }
  // Adiciona nos extras se não for fixo nesse dia
  const patient  = state.patients.find(p => p.id === pid);
  const dow      = dayOfWeek(date);
  const isFixed  = (patient?.fixedDays||[]).includes(dow);
  if (!isFixed) {
    if (!state.extras[date]) state.extras[date] = [];
    if (!state.extras[date].includes(pid)) state.extras[date].push(pid);
  }
  scheduleSave();
  closeModals();
  renderAll();
}

function closeModals() {
  document.getElementById("modal-status").style.display = "none";
  document.getElementById("modal-add-day").style.display = "none";
  modalStatusCtx = null;
  modalAddCtx = null;
}

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary() {
  const el = document.getElementById("view-summary");
  if (!state.patients.length) {
    el.innerHTML = monthNavHTML() + `<p class="empty-msg">Nenhum paciente cadastrado ainda.</p>`;
    return;
  }
  const cards = state.patients.map(p => {
    const days = daysInMonth(selectedMonth, selectedYear);
    const counts = { realizado:0, faltou:0, desmarcado_paciente:0, desmarcado_eu:0 };
    const realizadoDays = [];
    for (let d = 1; d <= days; d++) {
      const date = fmtDate(selectedYear, selectedMonth, d);
      const pToday = getPatientsForDay(date); // respeita selectedPatient=null aqui
      if (!pToday.find(pt => pt.id === p.id)) continue; // só conta dias em que estava agendado
      const st = state.records[getKey(date, p.id)];
      if (st && st in counts) {
        counts[st]++;
        if (st === "realizado") realizadoDays.push(d);
      }
    }
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    return `<div class="summary-card" style="border-left:4px solid ${p.color}">
      <div class="summary-header">
        <div>
          <div class="summary-name" style="color:${p.color}">${p.name}</div>
          <div class="summary-period">${MONTHS[selectedMonth]} ${selectedYear}</div>
        </div>
        <div style="text-align:right">
          <div class="summary-count">${counts.realizado}</div>
          <div class="summary-count-label">realizados</div>
        </div>
      </div>
      <div class="summary-grid">
        ${[["realizado","✓"],["faltou","✗"],["desmarcado_paciente","↩"],["desmarcado_eu","↪"]].map(([s,icon])=>`
          <div class="summary-stat" style="background:${STATUS[s].bg};border:1px solid ${STATUS[s].color}33">
            <div class="summary-stat-icon" style="color:${STATUS[s].color}">${icon}</div>
            <div class="summary-stat-num" style="color:${STATUS[s].color}">${counts[s]}</div>
            <div class="summary-stat-label">${STATUS[s].label}</div>
          </div>`).join("")}
      </div>
      ${realizadoDays.length ? `
        <div class="days-realizados">
          <div class="days-realizados-title">📋 Dias realizados (para cobrança):</div>
          <div>${realizadoDays.map(d=>`<span class="day-badge">${String(d).padStart(2,'0')}/${String(selectedMonth+1).padStart(2,'0')}</span>`).join("")}</div>
        </div>` : total===0 ? `<p class="empty-msg">Nenhum atendimento registrado neste mês</p>` : ""}
    </div>`;
  }).join("");
  el.innerHTML = monthNavHTML() + cards;
}

// ── Patients ──────────────────────────────────────────────────────────────────
function renderPatients() {
  const el = document.getElementById("view-patients");

  const wdPicker = (selectedDays) => `
    <div style="margin-top:10px">
      <div style="font-size:12px;color:#64748b;margin-bottom:6px">Dias fixos da semana (opcional):</div>
      <div class="weekdays-picker">
        ${DAYS_SHORT.map((d,i)=>`
          <button class="wd-btn ${selectedDays.includes(i)?'selected':''}" onclick="toggleNewDay(${i})">${d}</button>
        `).join("")}
      </div>
    </div>`;

  const list = state.patients.map(p => {
    if (editingPatient === p.id) {
      return `<div class="patient-row" style="border-left:4px solid ${p.color}">
        <input class="text-input" id="edit-name-${p.id}" value="${p.name}" style="margin-bottom:10px"/>
        <div style="font-size:12px;color:#64748b;margin-bottom:6px">Dias fixos:</div>
        <div class="weekdays-picker" id="edit-wd-${p.id}">
          ${DAYS_SHORT.map((d,i)=>`
            <button class="wd-btn ${(p.fixedDays||[]).includes(i)?'selected':''}"
              onclick="toggleEditDay(${p.id},${i})">${d}</button>
          `).join("")}
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn-primary" onclick="saveEdit(${p.id})" style="flex:1">Salvar</button>
          <button class="btn-edit" onclick="cancelEdit()">Cancelar</button>
        </div>
      </div>`;
    }
    const fixedLabel = (p.fixedDays||[]).length
      ? (p.fixedDays||[]).sort((a,b)=>a-b).map(i=>DAYS_SHORT[i]).join(", ")
      : "Sem dias fixos";
    return `<div class="patient-row" style="border-left:4px solid ${p.color}">
      <div class="patient-row-top">
        <span class="patient-name" style="color:${p.color}">${p.name}</span>
        <div class="patient-actions">
          <button class="btn-edit" onclick="startEdit(${p.id})">✏️</button>
          <button class="btn-del" onclick="removePatient(${p.id})">🗑️</button>
        </div>
      </div>
      <div class="patient-days">
        <span style="color:#475569;font-size:11px">📅 ${fixedLabel}</span>
      </div>
    </div>`;
  }).join("");

  el.innerHTML = `
    <div class="add-patient-box">
      <div class="add-patient-title">+ Adicionar paciente</div>
      <input class="text-input" id="new-patient-input" placeholder="Nome do paciente..." onkeydown="if(event.key==='Enter')addPatient()"/>
      <div id="new-wd-picker">${wdPicker(newFixedDays)}</div>
      <button class="btn-primary" onclick="addPatient()" style="margin-top:12px;width:100%">Adicionar</button>
    </div>
    ${list || '<p class="empty-msg">Nenhum paciente cadastrado.</p>'}`;
}

function toggleNewDay(i) {
  if (newFixedDays.includes(i)) newFixedDays = newFixedDays.filter(d=>d!==i);
  else newFixedDays.push(i);
  renderPatients();
}

function toggleEditDay(pid, i) {
  const p = state.patients.find(p=>p.id===pid);
  if (!p) return;
  if (!p.fixedDays) p.fixedDays = [];
  if (p.fixedDays.includes(i)) p.fixedDays = p.fixedDays.filter(d=>d!==i);
  else p.fixedDays.push(i);
  renderPatients();
}

function addPatient() {
  const inp  = document.getElementById("new-patient-input");
  const name = inp?.value.trim();
  if (!name) return;
  const color = COLORS[state.patients.length % COLORS.length];
  state.patients.push({ id: Date.now(), name, color, fixedDays: [...newFixedDays] });
  newFixedDays = [];
  scheduleSave();
  renderPatients();
}

function removePatient(id) {
  if (!confirm("Remover paciente e todos os registros?")) return;
  state.patients = state.patients.filter(p=>p.id!==id);
  Object.keys(state.records).forEach(k=>{ if(k.endsWith(`_${id}`)) delete state.records[k]; });
  Object.keys(state.extras).forEach(date=>{ state.extras[date]=state.extras[date].filter(i=>i!==id); });
  Object.keys(state.removed).forEach(date=>{ state.removed[date]=state.removed[date].filter(i=>i!==id); });
  scheduleSave();
  renderPatients();
}

function startEdit(id)  { editingPatient = id;   renderPatients(); }
function cancelEdit()   { editingPatient = null; renderPatients(); }

function saveEdit(id) {
  const inp  = document.getElementById(`edit-name-${id}`);
  const name = inp?.value.trim();
  if (name) state.patients = state.patients.map(p => p.id===id ? {...p, name} : p);
  editingPatient = null;
  scheduleSave();
  renderPatients();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
